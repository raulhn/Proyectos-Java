<div class="main-container">
  <div class="container">
    <div class="carousel" role="region" aria-roledescription="carousel">
      <div
        class="slides"
        #slideContainer
        [style.transform]="translateX"
        [style.transition]="isDragging ? 'transform' : 'transform .5s ease'"
      >
        @for (img of images; track $index) {
          <img [style.--ancho-slide]="anchoSlide" class="slide" [src]="img" alt="Carousel image" />
        }
      </div>
    </div>
  </div>
</div>

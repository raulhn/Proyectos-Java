<div class="datatable">
  <div class="toolbar">
    <input type="text" placeholder="Filter…" (input)="onFilterChange($event)" />
    <button type="button" (click)="exportCsv()">Export CSV</button>
  </div>

  <table *ngIf="paginatedData.length; else noData">
    <thead>
      <tr>
        <th *ngFor="let col of columns">{{ col | titlecase }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of paginatedData" (click)="selectRow(row)"
        [class.selected]="row === selectedRow" style="cursor: pointer;">
        <td *ngFor="let col of columns">{{ row[col] }}</td>
      </tr>
    </tbody>
  </table>
<div class="pagination" *ngIf="totalPages > 1">
  <button type="button" (click)="prevPage()" [disabled]="currentPage===1">Prev</button>
  <span>Page {{currentPage}} / {{totalPages}}</span>
  <button type="button" (click)="nextPage()" [disabled]="currentPage===totalPages">Next</button>
</div>

<style>
  .pagination {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }
  button[disabled] {
    opacity: 0.4;
    cursor: not-allowed;
  }
</style>

<ng-template #noData>
    <p>No data available.</p>
  </ng-template>
</div>
